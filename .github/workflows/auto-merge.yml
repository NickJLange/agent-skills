name: Auto-merge

on:
  workflow_run:
    workflows: ["Smoke Tests"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    steps:
      - name: Merge PR on green
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Smoke tests passed (run #${{ github.event.workflow_run.id }})"

          HEAD_BRANCH="${{ github.event.workflow_run.head_branch }}"
          echo "Looking for PRs with head branch: $HEAD_BRANCH"

          PR_NUMBER=$(gh pr list --head "$HEAD_BRANCH" --state open --json number --jq '.[0].number // empty')

          if [ -z "$PR_NUMBER" ]; then
            echo "No open PR found for this commit"
            exit 0
          fi

          echo "Auto-merging PR #$PR_NUMBER..."
          gh pr merge "$PR_NUMBER" --squash --delete-branch
          echo "Merged."
